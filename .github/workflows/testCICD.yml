#intento de workflow para python

name: test CI[CD]

on:
  push:
    branches:
      - TestCICD
  pull_request:
    branches:
      - TestCICD

permissions: read-all

jobs:
  build:
    runs-on: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v6

      - name: setup de python3
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: instalar dependencias
        run: |
          python -m pip install --upgrade pip
          python -m pip install flake8 pytest
          python -m pip install -r Experimentos/requisitos.txt

      - name: un poco de linting usando flake8
        run: |
          flake8 Experimentos/estadosHTTP.py
          flake8 Experimentos/test_estadosHTTP.py

      - name: testeamos con pytest
        run: |
          pytest
